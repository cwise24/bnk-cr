<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OVN-Kubernetes CNI — Interactive Training</title>
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
      --border: #30363d; --text: #e6edf3; --muted: #8b949e;
      --red: #ee0000; --red-dim: #7d1c1c; --blue: #58a6ff;
      --green: #3fb950; --yellow: #d29922; --purple: #bc8cff; --cyan: #39c5cf;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

    .header {
      background: linear-gradient(135deg, #1a0000 0%, #161b22 60%, #0d1117 100%);
      border-bottom: 2px solid var(--red);
      padding: 1.25rem 2rem;
      display: flex; align-items: center; gap: 1rem;
    }
    .header-logo { width: 44px; height: 44px; flex-shrink: 0; }
    .header-title { font-size: 1.4rem; font-weight: 700; }
    .header-sub { font-size: 0.8rem; color: var(--muted); font-family: monospace; margin-top: 3px; }
    .header-badge { margin-left: auto; text-align: right; }
    .header-badge span { display: block; font-family: monospace; font-size: 0.75rem; }

    .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; overflow-x: auto; }
    .tab {
      padding: 0.875rem 1.25rem; cursor: pointer; font-size: 0.875rem; font-weight: 500;
      color: var(--muted); border: none; border-bottom: 2px solid transparent;
      background: none; white-space: nowrap; font-family: inherit; transition: all 0.2s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--red); border-bottom-color: var(--red); }

    .content { padding: 1.75rem 2rem; max-width: 1200px; margin: 0 auto; }
    .section-title { font-size: 1rem; font-weight: 700; margin-bottom: 0.5rem; }
    .section-desc { color: var(--muted); font-size: 0.875rem; line-height: 1.65; margin-bottom: 1.25rem; }

    .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .diagram-header {
      padding: 0.75rem 1.25rem; border-bottom: 1px solid var(--border);
      font-size: 0.8rem; font-weight: 600; color: var(--muted); font-family: monospace;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .diagram-body { padding: 1.25rem; }

    .flow-layout { display: grid; grid-template-columns: 1fr 270px; gap: 1.25rem; }
    @media (max-width: 800px) { .flow-layout { grid-template-columns: 1fr; } .content { padding: 1rem; } }

    .step-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
    .step-panel-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.875rem; }
    .step-item { display: flex; gap: 0.625rem; padding: 0.625rem 0.75rem; border-radius: 6px; margin-bottom: 0.375rem; border: 1px solid transparent; transition: all 0.25s; cursor: pointer; }
    .step-item:hover { background: rgba(255,255,255,0.03); border-color: var(--border); }
    .step-item.active { background: rgba(238,0,0,0.08); border-color: var(--red-dim); }
    .step-num {
      width: 20px; height: 20px; border-radius: 50%; background: var(--surface2);
      border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 700; flex-shrink: 0; color: var(--muted); transition: all 0.25s;
    }
    .step-item.active .step-num { background: var(--red); border-color: var(--red); color: #fff; }
    .step-label { font-size: 0.77rem; font-weight: 600; color: var(--muted); transition: color 0.25s; }
    .step-item.active .step-label { color: var(--text); }
    .step-desc { font-size: 0.75rem; color: var(--muted); line-height: 1.45; margin-top: 3px; }

    .controls { display: flex; gap: 0.625rem; margin-bottom: 1rem; }
    .btn {
      padding: 0.45rem 0.9rem; border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text); font-size: 0.8rem; cursor: pointer;
      font-family: inherit; transition: all 0.2s;
    }
    .btn:hover { background: var(--border); }
    .btn.primary { background: var(--red); border-color: var(--red); color: #fff; }
    .btn.primary:hover { background: #cc0000; }

    .kv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.75rem; margin-top: 1.25rem; }
    .kv-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 0.75rem; }
    .kv-label { font-size: 0.65rem; color: var(--muted); font-family: monospace; text-transform: uppercase; margin-bottom: 4px; }
    .kv-value { font-size: 0.85rem; font-weight: 700; font-family: monospace; }

    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 0.875rem; margin-top: 1rem; }
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 1.125rem; cursor: pointer; transition: all 0.2s;
    }
    .card:hover { border-color: var(--red); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(238,0,0,0.1); }
    .card-icon { font-size: 1.4rem; margin-bottom: 0.625rem; }
    .card-title { font-size: 0.875rem; font-weight: 700; font-family: monospace; margin-bottom: 0.375rem; }
    .card-desc { font-size: 0.78rem; color: var(--muted); line-height: 1.5; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.68rem; font-weight: 600; font-family: monospace; margin-top: 0.625rem; }
    .b-red { background: rgba(238,0,0,.12); color: var(--red); }
    .b-blue { background: rgba(88,166,255,.12); color: var(--blue); }
    .b-green { background: rgba(63,185,80,.12); color: var(--green); }
    .b-purple { background: rgba(188,140,255,.12); color: var(--purple); }
    .b-cyan { background: rgba(57,197,207,.12); color: var(--cyan); }

    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.75rem; max-width: 580px; width: 100%; position: relative; max-height: 80vh; overflow-y: auto; }
    .modal-close { position: absolute; top: 1rem; right: 1rem; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    .modal h2 { font-family: monospace; font-size: 1rem; color: var(--blue); margin-bottom: 1rem; }
    .modal p { font-size: 0.83rem; color: var(--muted); line-height: 1.6; margin-bottom: 0.625rem; }
    pre { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 0.875rem; font-family: monospace; font-size: 0.72rem; color: var(--cyan); overflow-x: auto; margin-top: 0.75rem; line-height: 1.5; }
    svg text { user-select: none; }
  .back-nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 6px 2rem; }
  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: monospace; font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted); text-decoration: none;
    padding: 4px 12px; border: 1px solid var(--border); border-radius: 20px;
    background: rgba(255,255,255,0.02); transition: color .2s, border-color .2s;
  }
  .back-link:hover { color: var(--red); border-color: var(--red-dim); }
  </style>

<script type="text/babel">
const { useState, useRef, useCallback } = React;

// ── DATA ─────────────────────────────────────────────────────────────────────

const NS_STEPS = [
  { label: "Client sends TCP request", desc: "External client initiates a connection to the app URL. DNS resolves to the OpenShift Router / cloud LB VIP." },
  { label: "OpenShift Router / Load Balancer", desc: "HAProxy Ingress Controller or cloud LoadBalancer receives the traffic and forwards to a NodePort on a cluster node." },
  { label: "Gateway Node — OVS br-ex", desc: "Packet enters the gateway node via br-ex, the OVS external bridge connected to the physical NIC." },
  { label: "OVN Gateway Router — DNAT", desc: "The OVN logical gateway router performs DNAT: translates Service ClusterIP → selected Pod IP. Load balancing happens here." },
  { label: "Geneve encapsulation (UDP 6081)", desc: "If the target pod is on a different node, the packet is encapsulated in Geneve with the tunnel key identifying the logical datapath." },
  { label: "Worker Node — OVS br-int", desc: "The Geneve packet arrives at the target node. OVS decapsulates it, matches the logical port binding, and enforces ACL rules." },
  { label: "veth pair → pod namespace", desc: "OVS forwards the packet through the veth pair into the pod's isolated Linux network namespace." },
  { label: "Pod / Container receives ✓", desc: "The application container receives the TCP packet on its eth0 interface. NetworkPolicy ACLs were enforced in OVS before delivery." },
];

const EW_STEPS = [
  { label: "Pod A sends to Pod B's IP", desc: "Pod A initiates traffic to Pod B's pod IP. The packet exits eth0 through the veth into OVS br-int on Node 1." },
  { label: "OVS checks logical flow table", desc: "ovn-controller has pre-programmed OVS with logical flows derived from the OVN Southbound DB. OVS matches src/dst logical port." },
  { label: "NetworkPolicy ACL check", desc: "OVS evaluates OVN ACLs translated from Kubernetes NetworkPolicy objects — both egress from Pod A and ingress to Pod B are checked." },
  { label: "Same-node? Direct delivery", desc: "If Pod B is on Node 1, OVS delivers directly via its veth — no encapsulation, no tunnel, minimal latency." },
  { label: "Cross-node: Geneve tunnel", desc: "If Pod B is on Node 2, the packet is Geneve-encapsulated. The outer IP dst is Node 2's TEP (Tunnel Endpoint = node primary IP)." },
  { label: "Node 2 OVS decapsulates", desc: "OVS on Node 2 receives the Geneve frame, decapsulates, extracts the logical port binding, and re-applies ACL rules for the destination pod." },
  { label: "Pod B receives packet ✓", desc: "Pod B's container receives the packet. The logical network abstraction is maintained end-to-end — pods see flat L3 connectivity." },
];

const COMPONENTS = [
  { icon:"🧠", title:"ovn-northd", badge:"b-red", badgeText:"Control Plane",
    desc:"Central translator daemon. Reads desired logical state from NB DB (switches, routers, ACLs) and compiles physical flows into SB DB.",
    detail:`ovn-northd bridges the logical and physical network state in OVN.\n\nIt reads the OVN Northbound Database — where ovn-kubernetes writes the desired topology (logical ports, switches, routers, load balancers, ACLs derived from NetworkPolicy) — and computes the corresponding Logical_Flow entries for each datapath, storing them in the OVN Southbound Database.\n\nIn OpenShift, ovn-northd runs inside the ovnkube-master DaemonSet on control plane nodes. It is the single point of translation, so HA is handled via RAFT-based leader election in the OVN databases.`,
    code:`# Check ovn-northd pods\noc get pods -n openshift-ovn-kubernetes -l app=ovnkube-master\n\n# View logical network topology\noc -n openshift-ovn-kubernetes exec -it \\\n  ds/ovnkube-master -- ovn-nbctl show\n\n# List all logical switches\noc -n openshift-ovn-kubernetes exec -it \\\n  ds/ovnkube-master -- ovn-nbctl ls-list` },

  { icon:"🗄️", title:"OVN Northbound DB", badge:"b-blue", badgeText:"Database",
    desc:"Source of truth for logical network state: logical switches (per-node), logical routers, load balancers, ACLs from NetworkPolicy, and port bindings.",
    detail:`The OVN Northbound Database stores the desired logical network topology.\n\nKey tables:\n- Logical_Switch: one per node (contains all pod ports on that node)\n- Logical_Switch_Port: one per pod, one per host interface\n- Logical_Router: distributed router (inter-pod routing) + gateway router (N-S)\n- Logical_Router_Port: connects routers to switches\n- ACL: Kubernetes NetworkPolicy → OVN ACL rules (priority + match + action)\n- Load_Balancer: Kubernetes Services → OVN LB rules (VIP:port → pod_ip:port)\n- NAT: SNAT/DNAT rules for egress IP and gateway\n\novn-kubernetes (the CNI plugin) writes to the NB DB whenever pods are created/deleted or NetworkPolicies change.`,
    code:`# Show full NB database\noc -n openshift-ovn-kubernetes exec -it \\\n  ds/ovnkube-master -- ovn-nbctl show\n\n# List ACLs on a namespace switch\noc -n openshift-ovn-kubernetes exec -it \\\n  ds/ovnkube-master -- ovn-nbctl acl-list <switch>\n\n# List load balancers (Services)\noc -n openshift-ovn-kubernetes exec -it \\\n  ds/ovnkube-master -- ovn-nbctl lb-list` },

  { icon:"📡", title:"OVN Southbound DB", badge:"b-blue", badgeText:"Database",
    desc:"Physical flow state: chassis registrations, port bindings (pod→node), compiled logical flows, MAC bindings. ovn-controllers watch this DB.",
    detail:`The OVN Southbound Database is the compiled physical state computed by ovn-northd.\n\nKey tables:\n- Chassis: one entry per node, registers TEP IP and tunnel type\n- Port_Binding: maps each logical port to a physical Chassis\n- Logical_Flow: compiled OpenFlow-style rules per datapath pipeline stage\n- MAC_Binding: ARP/ND cache entries for the logical network\n- BFD: Bidirectional Forwarding Detection for tunnel health monitoring\n- IGMP_Group: multicast group memberships\n\nEach ovn-controller on a node watches the SB DB and filters for only the flows relevant to its chassis — minimizing data synced to each node.`,
    code:`# View SB database\noc -n openshift-ovn-kubernetes exec -it \\\n  ds/ovnkube-master -- ovn-sbctl show\n\n# List all registered chassis (nodes)\noc -n openshift-ovn-kubernetes exec -it \\\n  ds/ovnkube-master -- ovn-sbctl chassis-list\n\n# Show logical flows for a datapath\noc -n openshift-ovn-kubernetes exec -it \\\n  ds/ovnkube-master -- ovn-sbctl lflow-list` },

  { icon:"⚙️", title:"ovn-controller", badge:"b-red", badgeText:"Node Agent",
    desc:"Per-node agent. Watches SB DB for relevant flows, programs OVS via OpenFlow, manages Geneve TEPs, and claims local port bindings.",
    detail:`ovn-controller is the per-node agent that bridges OVN and the kernel dataplane.\n\nResponsibilities:\n1. Register node as a Chassis in SB DB with TEP IP\n2. Claim Port_Bindings for pods scheduled on this node\n3. Watch SB DB Logical_Flows filtered to this chassis\n4. Translate logical flows → OpenFlow rules → program OVS br-int\n5. Create and manage Geneve tunnel interfaces (genev_sys_6081)\n6. Manage BFD sessions to detect dead tunnels\n7. Handle MAC/ARP resolution via the logical network\n\nRuns in the ovnkube-node DaemonSet pod on every cluster node.`,
    code:`# Check ovnkube-node pods (one per node)\noc get pods -n openshift-ovn-kubernetes -l app=ovnkube-node\n\n# View ovn-controller status\noc -n openshift-ovn-kubernetes exec -it \\\n  ds/ovnkube-node -- ovn-controller --version\n\n# Show OVS flows programmed by ovn-controller\noc -n openshift-ovn-kubernetes exec -it \\\n  ds/ovnkube-node -- ovs-ofctl dump-flows br-int` },

  { icon:"🔀", title:"Open vSwitch (OVS)", badge:"b-cyan", badgeText:"Dataplane",
    desc:"Kernel-level virtual switch. br-ex connects to physical NIC (gateway nodes), br-int connects to all pod veth pairs and Geneve tunnels.",
    detail:`Open vSwitch is the kernel forwarding engine that implements OVN's logical flows.\n\nTwo key bridges in OVN-Kubernetes:\n\nbr-ex (external bridge):\n- Connected to node's physical NIC\n- Handles ingress/egress for north-south traffic\n- Present on all nodes (shared gateway mode) or gateway nodes only\n\nbr-int (integration bridge):\n- All pod veth pairs attach here\n- Geneve tunnel ports attach here\n- All forwarding logic lives here\n- ACLs (NetworkPolicy) enforced here\n\nOVS uses a hybrid kernel/userspace architecture:\n- Fast path: kernel datapath (dpdk optional) for established flows\n- Slow path: ovs-vswitchd userspace for new flow classification\n\nFlow pipeline: ingress port → L2 classification → ACL → routing → output port`,
    code:`# View all OVS bridges\novs-vsctl show\n\n# Dump br-int flows (verbose)\novs-ofctl dump-flows br-int\n\n# Show all ports on br-int\novs-vsctl list-ports br-int\n\n# Check Geneve tunnel interface\novs-vsctl find Interface type=geneve` },

  { icon:"🌐", title:"Geneve Tunnel", badge:"b-purple", badgeText:"Overlay",
    desc:"Generic Network Virtualization Encapsulation. OVN-K8s uses Geneve (UDP 6081) for cross-node pod traffic. Carries tunnel metadata for flow classification.",
    detail:`Geneve (RFC 8926) is the overlay encapsulation protocol used by OVN-Kubernetes for inter-node pod traffic.\n\nWhy Geneve over VXLAN?\n- Extensible TLV options in variable-length header\n- Carries OVN metadata: logical datapath (24-bit) + logical ingress/egress port\n- Better suited to SDN/controller-driven environments than VXLAN\n- Port: UDP 6081 (VXLAN uses 4789)\n\nGeneve in OVN-Kubernetes:\n- Tunnel key (VNI equivalent) = logical datapath identifier\n- Geneve options encode logical port IDs for fast pipeline entry\n- TEP = node primary IP (used as src/dst for tunnel packets)\n- One tunnel interface per remote node (created on-demand)\n- MTU impact: Geneve adds ~50-100 bytes overhead → plan for 1450 pod MTU\n\nFirewall requirement: Allow UDP 6081 inbound/outbound between all cluster nodes.`,
    code:`# Check Geneve kernel interface\nip link show genev_sys_6081\n\n# List Geneve ports in OVS\novs-vsctl find Interface type=geneve\n\n# Verify tunnel connectivity\novs-ofctl show br-int | grep tun\n\n# Check node TEP assignments\noc -n openshift-ovn-kubernetes exec -it \\\n  ds/ovnkube-master -- ovn-sbctl show | grep encap` },

  { icon:"🛡️", title:"NetworkPolicy (ACLs)", badge:"b-green", badgeText:"Security",
    desc:"Kubernetes NetworkPolicy → OVN ACLs → OVS OpenFlow rules. Enforced in kernel at OVS layer on each node — both ingress and egress supported.",
    detail:`OVN-Kubernetes translates Kubernetes NetworkPolicy objects into OVN ACL rules, which are then compiled into OVS OpenFlow rules by ovn-controller.\n\nTranslation chain:\nKubernetes NetworkPolicy → ovn-k8s controller → OVN NB ACL → ovn-northd → SB Logical_Flow → ovn-controller → OVS OpenFlow rule\n\nACL enforcement points:\n- from-lport (priority 1000): egress from pod (leaving)\n- to-lport (priority 1000): ingress to pod (arriving)\n\nSupported features (vs OpenShift SDN):\n- Ingress AND Egress rules ✓ (SDN: ingress only)\n- podSelector, namespaceSelector, ipBlock ✓\n- Port + protocol filtering ✓\n- Default deny when policy exists ✓\n\nEgressFirewall (OpenShift extension):\n- Controls which external CIDRs/domains pods can reach\n- Uses EgressFirewall CRD per namespace\n- Enforced via OVN ACLs\n\nCritical: 100.64.0.0/16 is reserved for OVN internal use — never use this CIDR.`,
    code:`# List NetworkPolicies\noc get networkpolicy -A\n\n# View as OVN ACLs\noc -n openshift-ovn-kubernetes exec -it \\\n  ds/ovnkube-master -- \\\n  ovn-nbctl acl-list <namespace-switch-name>\n\n# Check EgressFirewall objects\noc get egressfirewall -A\n\n# Debug: trace a packet through OVS\novs-appctl ofproto/trace br-int \\\n  in_port=<port>,ip,nw_src=<pod-ip>,nw_dst=<dst-ip>` },

  { icon:"🔧", title:"Cluster Network Operator", badge:"b-blue", badgeText:"Lifecycle",
    desc:"OpenShift operator managing OVN-K8s lifecycle: deploys ovnkube-master + ovnkube-node DaemonSets, manages config via Network.operator.openshift.io API.",
    detail:`The Cluster Network Operator (CNO) is responsible for the full lifecycle of OVN-Kubernetes in OpenShift.\n\nManaged DaemonSets:\n- ovnkube-master: runs ovn-northd + NB DB + SB DB (control plane nodes)\n- ovnkube-node: runs ovn-controller + CNI plugin binary (all nodes)\n- ovs-node: runs OVS daemon (all nodes)\n\nConfiguration via Network.operator.openshift.io/cluster:\n- defaultNetwork.type: OVNKubernetes\n- ovnKubernetesConfig.mtu: pod MTU\n- ovnKubernetesConfig.genevePort: default 6081\n- ovnKubernetesConfig.gatewayConfig.routingViaHost: local gateway mode\n- ovnKubernetesConfig.ipsecConfig: enable IPsec between nodes\n- ovnKubernetesConfig.hybridOverlayConfig: Windows node support\n\nThe CNO watches these objects and reconciles actual state, handling upgrades and config changes.`,
    code:`# View CNO configuration\noc get network.operator.openshift.io cluster -o yaml\n\n# Check all OVN-K8s pods\noc get pods -n openshift-ovn-kubernetes\n\n# Watch CNO operator logs\noc logs -n openshift-network-operator \\\n  deployment/network-operator -f\n\n# Check network operator status\noc get clusteroperator network` },
];

    <rect x="40" y="110" width="820" height="90" rx="8" fill="#161b22" stroke="#30363d" strokeWidth="1.5"/>

    <rect x="353" y="140" width="195" height="48" rx="4" fill="#21262d" stroke="#ee0000" strokeWidth="1.5"/>

// ── NORTH-SOUTH FLOW ─────────────────────────────────────────────────────────

// Ball travels in a lane to the RIGHT of the step boxes (cx=680)
// Each cy is the vertical center of the corresponding box (i*67 + 20 + 26)
const NS_PTS = [
  {cx:680,cy:46},{cx:680,cy:113},{cx:680,cy:180},{cx:680,cy:247},
  {cx:680,cy:314},{cx:680,cy:381},{cx:680,cy:448},{cx:680,cy:515},
];

const NorthSouthFlow = ({activeStep, onStepChange}) => {
  const svgRef = useRef(null);
  const tlRef = useRef(null);
  const [playing, setPlaying] = useState(false);

  // Jump ball directly to a step when user clicks a step item
  const jumpToStep = useCallback((i) => {
    if (tlRef.current) tlRef.current.kill();
    setPlaying(false);
    const svg = svgRef.current;
    const pt = NS_PTS[i];
    gsap.to([svg.getElementById('ns-pkt'), svg.getElementById('ns-glw')], {
      attr: { cx: pt.cx, cy: pt.cy },
      duration: 0.4,
      ease: "power2.out"
    });
    const box = svg.getElementById(`ns-b-${i}`);
    if (box) {
      gsap.fromTo(box,
        { attr: { stroke: '#ee0000', strokeWidth: '2.5' } },
        { attr: { stroke: '#30363d', strokeWidth: '1.5' }, duration: 0.6, delay: 0.15 }
      );
    }
    onStepChange(i);
  }, [onStepChange]);

  const play = useCallback(() => {
    if (tlRef.current) tlRef.current.kill();
    const svg = svgRef.current;
    const pkt = svg.getElementById('ns-pkt');
    const glw = svg.getElementById('ns-glw');
    gsap.set([pkt, glw], {attr:{cx:680,cy:46}, opacity:1});
    onStepChange(0);
    const tl = gsap.timeline({onComplete:()=>setPlaying(false)});
    NS_PTS.forEach((pt,i)=>{
      if(i===0) return;
      tl.to([pkt,glw],{attr:{cx:pt.cx,cy:pt.cy},duration:0.65,ease:"power2.inOut",onStart:()=>onStepChange(i)});
      const box = svg.getElementById(`ns-b-${i}`);
      if(box){ tl.to(box,{attr:{stroke:'#ee0000',strokeWidth:'2.5'},duration:0.15},'<'); tl.to(box,{attr:{stroke:'#30363d',strokeWidth:'1.5'},duration:0.3},'+=0.2'); }
      tl.to({},{duration:0.25});
    });
    tlRef.current = tl;
    setPlaying(true);
  },[onStepChange]);

  const reset = useCallback(()=>{
    if(tlRef.current) tlRef.current.kill();
    const svg = svgRef.current;
    gsap.set([svg.getElementById('ns-pkt'),svg.getElementById('ns-glw')],{attr:{cx:680,cy:46},opacity:1});
    onStepChange(0); setPlaying(false);
  },[onStepChange]);

  const pause = useCallback(()=>{
    if(!tlRef.current) return;
    if(tlRef.current.paused()){tlRef.current.play();setPlaying(true);}
    else{tlRef.current.pause();setPlaying(false);}
  },[]);

  const boxes = [
    {id:'ns-b-0', label:'🌐 External Client', sub:'TCP SYN → app.example.com:443', sc:'#58a6ff'},
    {id:'ns-b-1', label:'OpenShift Router / Load Balancer', sub:'HAProxy Ingress / Cloud LB → NodePort', sc:'#58a6ff'},
    {id:'ns-b-2', label:'Gateway Node · OVS br-ex', sub:'External bridge — packet enters cluster node', sc:'#39c5cf'},
    {id:'ns-b-3', label:'OVN Gateway Router — DNAT', sub:'ClusterIP:port → PodIP:port · load balance', sc:'#ee0000'},
    {id:'ns-b-4', label:'Geneve Encapsulation (UDP 6081)', sub:'Tunnel key encodes logical datapath + port', sc:'#bc8cff'},
    {id:'ns-b-5', label:'Worker Node · OVS br-int', sub:'Decapsulate · logical port match · ACL check', sc:'#39c5cf'},
    {id:'ns-b-6', label:'veth pair → pod namespace', sub:'Kernel bridge to pod network namespace', sc:'#d29922'},
    {id:'ns-b-7', label:'Pod / Container  ✓', sub:'Application receives packet on eth0 interface', sc:'#3fb950'},
  ];

  return (
    <div>
      <div className="controls">
        <button className="btn primary" onClick={play}>▶ Play</button>
        <button className="btn" onClick={pause}>{playing?'⏸ Pause':'▶ Resume'}</button>
        <button className="btn" onClick={reset}>↺ Reset</button>
      </div>
      <div className="flow-layout">
        <div className="diagram-container">
          <svg ref={svgRef} viewBox="0 0 750 590" xmlns="http://www.w3.org/2000/svg" style={{width:'100%'}}>
            <defs>
              <radialGradient id="pg1" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stopColor="#fff"/>
                <stop offset="100%" stopColor="#58a6ff"/>
              </radialGradient>
              <filter id="gf1"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
              <marker id="ns-tick" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto">
                <path d="M0,0 L0,5 L5,2.5z" fill="#30363d"/>
              </marker>
            </defs>

            {/* ── Vertical ball track, RIGHT of boxes ── */}
            <text x="680" y="18" textAnchor="middle" fill="#30363d" fontSize="8" fontFamily="monospace" letterSpacing="1">PACKET</text>
            <line x1="680" y1="24" x2="680" y2="528" stroke="#21262d" strokeWidth="2" strokeDasharray="5 4"/>

            {/* ── Step boxes (left column) + horizontal connectors to track ── */}
            {boxes.map((b,i)=>{
              const cy = i*67+46;
              const isActive = activeStep === i;
              return (
                <g key={i}>
                  {/* Box */}
                  <rect id={b.id} x="15" y={i*67+20} width="570" height="52" rx="6"
                    fill="#161b22" stroke={isActive ? '#ee0000' : '#30363d'}
                    strokeWidth={isActive ? '2' : '1.5'}/>
                  <text x="300" y={i*67+44} textAnchor="middle" fill={b.sc} fontSize="11.5" fontFamily="monospace">{b.label}</text>
                  <text x="300" y={i*67+60} textAnchor="middle" fill="#8b949e" fontSize="9.5" fontFamily="monospace">{b.sub}</text>
                  {/* Horizontal connector: box right edge → ball track */}
                  <line
                    x1="585" y1={cy} x2="667" y2={cy}
                    stroke={isActive ? '#58a6ff' : '#21262d'}
                    strokeWidth={isActive ? '1.5' : '1'}
                    strokeDasharray="3 2"
                    markerEnd="url(#ns-tick)"
                  />
                  {/* Tick dot on track at this step */}
                  <circle cx="680" cy={cy} r="3"
                    fill={isActive ? '#58a6ff' : '#21262d'}/>
                </g>
              );
            })}

            {/* ── Glowing packet ball ── */}
            <circle id="ns-glw" cx="680" cy="46" r="16" fill="#58a6ff" opacity="0.22" filter="url(#gf1)"/>
            <circle id="ns-pkt" cx="680" cy="46" r="9" fill="url(#pg1)"/>
          </svg>
        </div>

        {/* ── Step panel — each item is clickable ── */}
        <div className="step-panel">
          <div className="step-panel-title">
            Packet Journey
            <span style={{fontSize:'0.63rem',color:'var(--muted)',fontWeight:400,marginLeft:'0.4rem',fontStyle:'italic'}}>click to jump</span>
          </div>
          {NS_STEPS.map((s,i)=>(
            <div
              key={i}
              className={`step-item${activeStep===i?' active':''}`}
              onClick={()=>jumpToStep(i)}
              title={`Jump to step ${i+1}`}
            >
              <div className="step-num">{i+1}</div>
              <div>
                <div className="step-label">{s.label}</div>
                {activeStep===i && <div className="step-desc">{s.desc}</div>}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};
