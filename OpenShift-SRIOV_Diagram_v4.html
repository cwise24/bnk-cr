<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OpenShift SR-IOV — F5 BIG-IP Next for Kubernetes — pod attachment & traffic flow</title>
<style>
  :root {
    --rh-red: #ee0000;
    --rh-red-dark: #a30000;
    --f5-red: #c8102e;
    --bg: #0f1117;
    --panel: #1a1d27;
    --panel-2: #232734;
    --text: #e5e7eb;
    --muted: #8a92a6;
    --line: #2c3142;
    --accent: #6ea8fe;
    --sriov: #3ddc97;
    --sriov-2: #5cd6ff;
    --kernel: #ffb454;
    --code-bg: #0b0d13;
    --code-key: #6ea8fe;
    --code-str: #e0c878;
    --code-comment: #6b7385;
    --code-num: #c490e4;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  .app {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 380px;
    grid-template-rows: auto auto auto;
    min-height: 100vh;
  }
  header {
    grid-column: 1 / -1;
    background: linear-gradient(90deg, #151821 0%, #1a1d27 100%);
    border-bottom: 1px solid var(--line);
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 {
    margin: 0; font-size: 17px; font-weight: 600; letter-spacing: 0.2px;
  }
  header h1 span.f5 { color: var(--f5-red); }
  header h1 span.rh { color: var(--rh-red); }
  header .subtitle { color: var(--muted); font-size: 12.5px; margin-top: 4px; }
  .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .btn {
    appearance: none; border: 1px solid var(--line); background: var(--panel-2); color: var(--text);
    padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 500;
    transition: all 0.15s ease;
  }
  .btn:hover { background: #2c3142; border-color: #3a4055; }
  .btn.primary { background: var(--rh-red); border-color: var(--rh-red); }
  .btn.primary:hover { background: var(--rh-red-dark); border-color: var(--rh-red-dark); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .stage {
    grid-column: 1;
    background: radial-gradient(ellipse at top, #161924 0%, var(--bg) 100%);
    padding: 24px;
    overflow: auto;
  }
  .stage svg { width: 100%; height: auto; display: block; }
  .sidebar {
    grid-column: 2;
    background: var(--panel);
    border-left: 1px solid var(--line);
    padding: 24px;
    overflow-y: auto;
  }
  .sidebar h2 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1.4px;
    color: var(--muted); margin: 0 0 14px 0; font-weight: 600;
  }
  .phase {
    padding: 13px 16px; border-radius: 8px; margin-bottom: 10px;
    border: 1px solid var(--line); background: var(--panel-2);
    cursor: pointer; transition: all 0.2s ease;
  }
  .phase:hover { border-color: #3a4055; }
  .phase.active {
    border-color: var(--f5-red);
    background: linear-gradient(180deg, rgba(200,16,46,0.10), rgba(200,16,46,0.02));
  }
  .phase .num {
    display: inline-block; width: 24px; height: 24px; border-radius: 50%;
    background: var(--line); color: var(--text); font-size: 12px; font-weight: 600;
    text-align: center; line-height: 24px; margin-right: 10px;
  }
  .phase.active .num { background: var(--f5-red); }
  .phase .title { font-size: 14px; font-weight: 600; }
  .phase .desc { font-size: 12.5px; color: var(--muted); margin-top: 8px; line-height: 1.55; }
  .legend {
    margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--line);
    font-size: 12.5px; color: var(--muted);
  }
  .legend .row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .legend .dot { width: 11px; height: 11px; border-radius: 50%; flex: 0 0 11px; }
  .legend .dot.sriov { background: var(--sriov); }
  .legend .dot.sriov2 { background: var(--sriov-2); }
  .legend .dot.kernel { background: var(--kernel); }
  .legend .dot.ctrl { background: var(--accent); }

  .reveal { opacity: 0; }
  .pkt { opacity: 0; }

  /* YAML / config section */
  .yaml-section {
    grid-column: 1 / -1;
    background: #0c0e15;
    border-top: 1px solid var(--line);
    padding: 36px 36px 60px;
  }
  .yaml-section h2.section-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1.6px;
    color: var(--muted); margin: 0 0 8px 0; font-weight: 600;
  }
  .yaml-section h3.section-headline {
    font-size: 22px; font-weight: 700; margin: 0 0 8px 0; color: var(--text);
  }
  .yaml-section p.section-lede {
    color: var(--muted); font-size: 13.5px; line-height: 1.6; max-width: 800px; margin: 0 0 28px 0;
  }
  .yaml-tabs {
    display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .yaml-tab {
    appearance: none; border: 1px solid var(--line); background: var(--panel-2); color: var(--muted);
    padding: 9px 16px; border-radius: 6px 6px 0 0; font-size: 13px; cursor: pointer; font-weight: 500;
    border-bottom: none;
  }
  .yaml-tab:hover { color: var(--text); }
  .yaml-tab.active {
    background: var(--code-bg); color: var(--text);
    border-color: var(--rh-red); border-bottom: 1px solid var(--code-bg);
    margin-bottom: -1px;
  }
  .yaml-pane {
    background: var(--code-bg); border: 1px solid var(--line); border-radius: 0 8px 8px 8px;
    padding: 22px 24px;
  }
  .yaml-pane .label-row {
    display: flex; gap: 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap;
  }
  .yaml-pane .badge {
    display: inline-block; padding: 3px 9px; border-radius: 4px; font-size: 10.5px;
    text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
  }
  .badge.openshift { background: rgba(238,0,0,0.16); color: #ff7373; border: 1px solid rgba(238,0,0,0.4); }
  .badge.vanilla { background: rgba(110,168,254,0.16); color: #a3c5ff; border: 1px solid rgba(110,168,254,0.4); }
  .badge.note { background: rgba(255,180,84,0.14); color: #ffd49b; border: 1px solid rgba(255,180,84,0.35); }
  .yaml-pane .filename {
    font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 12px; color: var(--muted);
  }
  .yaml-pane pre {
    margin: 0; font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 13px; line-height: 1.6; color: var(--text);
    white-space: pre; overflow-x: auto; padding: 4px 0;
    tab-size: 2;
  }
  .yaml-pane pre .k { color: var(--code-key); }
  .yaml-pane pre .s { color: var(--code-str); }
  .yaml-pane pre .n { color: var(--code-num); }
  .yaml-pane pre .c { color: var(--code-comment); font-style: italic; }
  .yaml-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 16px;
  }
  @media (max-width: 1100px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { grid-column: 1; border-left: none; border-top: 1px solid var(--line); }
    .yaml-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useRef, useEffect, useState, useCallback } = React;

const PHASES = [
  {
    title: "Hardware baseline",
    desc: "Bare-metal worker has two physically separate SR-IOV NICs: ens3f0 (cabled to the north/south fabric) and ens3f1 (cabled to the east/west fabric). No Virtual Functions exist yet."
  },
  {
    title: "Operator deploys",
    desc: "SR-IOV Network Operator installs the config-daemon, device-plugin, admission webhook, and resources injector on selected nodes."
  },
  {
    title: "Two NodePolicies → VFs",
    desc: "Two SriovNetworkNodePolicy CRs are applied — one per NIC. Config-daemon slices ens3f0 into 4 VFs (pool sriov_bnk_ext) and ens3f1 into 4 VFs (pool sriov_bnk_int). Both bound to vfio-pci so TMM can drive them via DPDK."
  },
  {
    title: "Device plugin advertises both pools",
    desc: "Device-plugin reports both VF pools to kubelet as separate extended resources: openshift.io/sriov_bnk_ext (4) and openshift.io/sriov_bnk_int (4)."
  },
  {
    title: "SriovNetworks → NADs",
    desc: "Two SriovNetwork CRs (each pointing at its own resourceName) generate two NetworkAttachmentDefinitions in the BNK namespace: sriov-external on NIC 1 and sriov-internal on NIC 2."
  },
  {
    title: "BIG-IP Next pod attached",
    desc: "TMM pod requests both NADs via the k8s.v1.cni.cncf.io/networks annotation plus 1× sriov_bnk_ext and 1× sriov_bnk_int. Multus invokes the SR-IOV CNI twice — pulling one VF from each NIC into the pod's network namespace."
  },
  {
    title: "Traffic flows — physically separate fabrics",
    desc: "North/south traffic enters and leaves on NIC 1 (ens3f0). East/west traffic to backend services rides NIC 2 (ens3f1). The two paths are physically isolated — separate PCIe devices, separate cables, separate switches — and both bypass the host kernel."
  }
];

function Diagram({ phase, playing, onPhaseChange }) {
  const refs = {
    apiserver: useRef(), operator: useRef(), webhook: useRef(), injector: useRef(), nadCloud: useRef(),
    crArrow: useRef(),
    kubelet: useRef(), multus: useRef(), ovnk: useRef(),
    configDaemon: useRef(), devicePlugin: useRef(), sriovCni: useRef(),
    advertiseLabel: useRef(),
    pod: useRef(), podApp: useRef(),
    extIf: useRef(), intIf: useRef(),
    vfMoveLine1: useRef(), vfMoveLine2: useRef(),
    kernelStack: useRef(), iptables: useRef(), ovsBox: useRef(), notInPathLabel: useRef(),
    pf: useRef(), pfLabel: useRef(),
    vfs: [useRef(), useRef(), useRef(), useRef(), useRef(), useRef(), useRef(), useRef()],
    nicSwitch: useRef(),
    pathExt: useRef(), pathInt: useRef(),
    pktExt: useRef(), pktInt: useRef(),
    wire: useRef()
  };

  const trafficTimelineRef = useRef(null);

  useEffect(() => {
    if (trafficTimelineRef.current) {
      trafficTimelineRef.current.kill();
      trafficTimelineRef.current = null;
    }

    const all = [
      refs.operator, refs.webhook, refs.injector, refs.apiserver, refs.crArrow, refs.nadCloud,
      refs.configDaemon, refs.devicePlugin, refs.multus, refs.ovnk, refs.kubelet, refs.sriovCni,
      ...refs.vfs, refs.advertiseLabel,
      refs.pod, refs.podApp, refs.extIf, refs.intIf,
      refs.vfMoveLine1, refs.vfMoveLine2,
      refs.kernelStack, refs.iptables, refs.ovsBox, refs.notInPathLabel,
      refs.pathExt, refs.pathInt, refs.pktExt, refs.pktInt
    ].map(r => r.current).filter(Boolean);

    gsap.set(all, { opacity: 0 });
    gsap.set([refs.pf.current, refs.pfLabel.current, refs.nicSwitch.current, refs.wire.current], { opacity: 1 });

    const reveal = (els, delay = 0, opts = {}) => {
      const arr = Array.isArray(els) ? els : [els];
      gsap.to(arr.map(r => r.current).filter(Boolean), {
        opacity: opts.opacity != null ? opts.opacity : 1,
        duration: 0.5, stagger: 0.08, delay, ease: "power2.out"
      });
    };

    if (phase >= 1) {
      reveal([refs.apiserver, refs.operator, refs.webhook, refs.injector]);
      reveal([refs.kubelet, refs.multus, refs.ovnk], 0.3);
    }
    if (phase >= 2) {
      reveal(refs.crArrow, 0.2);
      reveal(refs.configDaemon, 0.4);
      refs.vfs.forEach((r, i) => {
        if (!r.current) return;
        gsap.fromTo(r.current,
          { opacity: 0, x: -180, scale: 0.6 },
          { opacity: 1, x: 0, scale: 1, duration: 0.45, delay: 0.7 + i * 0.07, ease: "back.out(1.6)" }
        );
      });
    }
    if (phase >= 3) {
      reveal(refs.devicePlugin, 0.2);
      reveal(refs.advertiseLabel, 0.5);
    }
    if (phase >= 4) {
      reveal([refs.nadCloud, refs.sriovCni], 0.2);
    }
    if (phase >= 5) {
      reveal([refs.pod, refs.podApp], 0.2);
      reveal([refs.extIf, refs.intIf], 0.6);
      reveal([refs.vfMoveLine1, refs.vfMoveLine2], 0.9);
    }
    if (phase >= 6) {
      gsap.to([refs.kernelStack.current, refs.iptables.current, refs.ovsBox.current], {
        opacity: 0.30, duration: 0.5, delay: 0.1
      });
      reveal(refs.notInPathLabel, 0.3);
      reveal([refs.pathExt, refs.pathInt], 0.5);

      const tl = gsap.timeline({ repeat: -1, repeatDelay: 0.5, delay: 0.9 });
      tl.set([refs.pktExt.current, refs.pktInt.current], { opacity: 1 });

      // External VF packet — straight vertical from external interface down through NIC 1 to its wire
      const extPath = [
        { x: 410, y: 540 },
        { x: 410, y: 888 },
        { x: 410, y: 968 },
        { x: 410, y: 1020 }
      ];
      // Internal VF packet — straight vertical from internal interface down through NIC 2 to its wire
      const intPath = [
        { x: 1050, y: 540 },
        { x: 1050, y: 888 },
        { x: 1050, y: 968 },
        { x: 1050, y: 1020 }
      ];
      extPath.forEach((p, i) => {
        tl.to(refs.pktExt.current, { attr: { cx: p.x, cy: p.y }, duration: 0.4, ease: "none" }, i === 0 ? 0 : ">");
      });
      tl.to(refs.pktExt.current, { opacity: 0, duration: 0.2 }, ">-0.1");

      intPath.forEach((p, i) => {
        tl.to(refs.pktInt.current, { attr: { cx: p.x, cy: p.y }, duration: 0.4, ease: "none" }, i === 0 ? 0.05 : ">");
      });
      tl.to(refs.pktInt.current, { opacity: 0, duration: 0.2 }, ">-0.1");

      tl.set(refs.pktExt.current, { attr: { cx: 410, cy: 540 } });
      tl.set(refs.pktInt.current, { attr: { cx: 1050, cy: 540 } });

      trafficTimelineRef.current = tl;
    }

    return () => {
      if (trafficTimelineRef.current) {
        trafficTimelineRef.current.kill();
      }
    };
  }, [phase]);

  useEffect(() => {
    if (!playing) return;
    if (phase >= PHASES.length - 1) return;
    const t = setTimeout(() => onPhaseChange(phase + 1), 2500);
    return () => clearTimeout(t);
  }, [playing, phase, onPhaseChange]);

  return (
    <svg viewBox="0 0 1400 1080" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="podGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0" stopColor="#1f2433" />
          <stop offset="1" stopColor="#171a26" />
        </linearGradient>
        <linearGradient id="nicGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0" stopColor="#22293b" />
          <stop offset="1" stopColor="#161a26" />
        </linearGradient>
        <linearGradient id="nodeGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0" stopColor="#13161f" />
          <stop offset="1" stopColor="#0f1117" />
        </linearGradient>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#6ea8fe" />
        </marker>
      </defs>

      {/* CONTROL PLANE BAND */}
      <text x="40" y="34" fill="#8a92a6" fontSize="12" fontWeight="600" letterSpacing="1.6">CLUSTER CONTROL PLANE</text>
      <g ref={refs.apiserver} className="reveal">
        <rect x="40" y="48" width="220" height="56" rx="7" fill="#1a1d27" stroke="#2c3142" strokeWidth="1.4" />
        <text x="150" y="74" textAnchor="middle" fill="#e5e7eb" fontSize="14" fontWeight="600">kube-apiserver</text>
        <text x="150" y="92" textAnchor="middle" fill="#8a92a6" fontSize="11">CRDs · admission</text>
      </g>
      <g ref={refs.operator} className="reveal">
        <rect x="290" y="48" width="260" height="56" rx="7" fill="#1a1d27" stroke="#ee0000" strokeWidth="1.6" />
        <text x="420" y="72" textAnchor="middle" fill="#e5e7eb" fontSize="14" fontWeight="600">SR-IOV Network Operator</text>
        <text x="420" y="92" textAnchor="middle" fill="#8a92a6" fontSize="11">reconciles SriovNetworkNodePolicy / SriovNetwork</text>
      </g>
      <g ref={refs.webhook} className="reveal">
        <rect x="580" y="48" width="200" height="56" rx="7" fill="#1a1d27" stroke="#2c3142" strokeWidth="1.4" />
        <text x="680" y="72" textAnchor="middle" fill="#e5e7eb" fontSize="13" fontWeight="600">Admission Webhook</text>
        <text x="680" y="92" textAnchor="middle" fill="#8a92a6" fontSize="11">validates NodePolicy</text>
      </g>
      <g ref={refs.injector} className="reveal">
        <rect x="810" y="48" width="220" height="56" rx="7" fill="#1a1d27" stroke="#2c3142" strokeWidth="1.4" />
        <text x="920" y="72" textAnchor="middle" fill="#e5e7eb" fontSize="13" fontWeight="600">Resources Injector</text>
        <text x="920" y="92" textAnchor="middle" fill="#8a92a6" fontSize="11">mutates pod resource requests</text>
      </g>
      <g ref={refs.nadCloud} className="reveal">
        <rect x="1060" y="48" width="300" height="56" rx="7" fill="#0f2233" stroke="#3ddc97" strokeWidth="1.6" strokeDasharray="5 3" />
        <text x="1210" y="72" textAnchor="middle" fill="#3ddc97" fontSize="13" fontWeight="600">NAD: sriov-external</text>
        <text x="1210" y="92" textAnchor="middle" fill="#5cd6ff" fontSize="13" fontWeight="600">NAD: sriov-internal</text>
      </g>

      {/* CR delivery arrow — orthogonal L from operator down into worker node header */}
      <g ref={refs.crArrow} className="reveal">
        <path d="M 420 104 V 130 H 700 V 162"
              stroke="#6ea8fe" strokeWidth="1.8" fill="none" strokeDasharray="6 4" markerEnd="url(#arrow)" />
        <text x="710" y="124" fill="#6ea8fe" fontSize="12" fontStyle="italic">apply CRDs · push config</text>
      </g>

      {/* WORKER NODE container */}
      <rect x="20" y="160" width="1360" height="880" rx="14" fill="url(#nodeGrad)" stroke="#2c3142" strokeWidth="1.6" />
      <text x="40" y="186" fill="#8a92a6" fontSize="12" fontWeight="600" letterSpacing="1.6">WORKER NODE — Red Hat CoreOS</text>
      <text x="1360" y="186" textAnchor="end" fill="#8a92a6" fontSize="11.5">openshift-sriov-network-operator namespace</text>

      {/* Operator components row on the node */}
      <g ref={refs.kubelet} className="reveal">
        <rect x="40" y="210" width="170" height="50" rx="6" fill="#1a1d27" stroke="#2c3142" strokeWidth="1.4" />
        <text x="125" y="240" textAnchor="middle" fill="#e5e7eb" fontSize="13.5" fontWeight="600">kubelet</text>
      </g>
      <g ref={refs.multus} className="reveal">
        <rect x="225" y="210" width="170" height="50" rx="6" fill="#1a1d27" stroke="#6ea8fe" strokeWidth="1.4" />
        <text x="310" y="240" textAnchor="middle" fill="#e5e7eb" fontSize="13.5" fontWeight="600">Multus CNI</text>
      </g>
      <g ref={refs.ovnk} className="reveal">
        <rect x="410" y="210" width="200" height="50" rx="6" fill="#1a1d27" stroke="#ffb454" strokeWidth="1.4" />
        <text x="510" y="240" textAnchor="middle" fill="#e5e7eb" fontSize="13.5" fontWeight="600">OVN-Kubernetes</text>
      </g>
      <g ref={refs.configDaemon} className="reveal">
        <rect x="630" y="210" width="220" height="50" rx="6" fill="#1a1d27" stroke="#ee0000" strokeWidth="1.4" />
        <text x="740" y="240" textAnchor="middle" fill="#e5e7eb" fontSize="13.5" fontWeight="600">SR-IOV Config Daemon</text>
      </g>
      <g ref={refs.devicePlugin} className="reveal">
        <rect x="870" y="210" width="220" height="50" rx="6" fill="#1a1d27" stroke="#ee0000" strokeWidth="1.4" />
        <text x="980" y="240" textAnchor="middle" fill="#e5e7eb" fontSize="13.5" fontWeight="600">SR-IOV Device Plugin</text>
      </g>
      <g ref={refs.sriovCni} className="reveal">
        <rect x="1110" y="210" width="170" height="50" rx="6" fill="#1a1d27" stroke="#3ddc97" strokeWidth="1.4" />
        <text x="1195" y="240" textAnchor="middle" fill="#e5e7eb" fontSize="13.5" fontWeight="600">SR-IOV CNI</text>
      </g>

      {/* Advertise arrow — orthogonal route ABOVE the row, from device-plugin top up, across, down to kubelet top */}
      <g ref={refs.advertiseLabel} className="reveal">
        <path d="M 980 210 V 196 H 125 V 210"
              stroke="#6ea8fe" strokeWidth="1.6" fill="none" strokeDasharray="5 3" markerEnd="url(#arrow)" />
        <rect x="430" y="183" width="320" height="22" rx="4" fill="#0f1117" stroke="#2c3142" strokeWidth="1" />
        <text x="590" y="199" textAnchor="middle" fill="#6ea8fe" fontSize="11.5" fontStyle="italic">openshift.io/sriov_bnk_ext: 4  ·  sriov_bnk_int: 4</text>
      </g>

      {/* THE BIG-IP NEXT POD */}
      <g ref={refs.pod} className="reveal">
        <rect x="300" y="340" width="840" height="200" rx="12" fill="url(#podGrad)" stroke="#c8102e" strokeWidth="2" />
        <text x="320" y="368" fill="#c8102e" fontSize="13" fontWeight="700" letterSpacing="1.4">F5 BIG-IP NEXT FOR KUBERNETES — TMM POD</text>

    [['', '  '], ['k', 'restartPolicy'], ['', ': '], ['s', 'Always']],
    [['', '  '], ['k', 'containers'], ['', ':']],
    [['', '    - '], ['k', 'name'], ['', ': '], ['s', 'tmm']],
    [['', '      '], ['k', 'image'], ['', ': '], ['s', 'registry.f5.com/big-ip-next/tmm:1.0']],
    [['', '      '], ['k', 'securityContext'], ['', ':']],
    [['', '        '], ['k', 'capabilities'], ['', ':']],
    [['', '          '], ['k', 'add'], ['', ': '], ['s', '["IPC_LOCK", "NET_RAW"]']],
    [['', '      '], ['k', 'resources'], ['', ':']],
    [['', '        '], ['k', 'requests'], ['', ':']],
    [['', '          '], ['k', 'openshift.io/sriov_bnk_ext'], ['', ': '], ['s', '"1"'], ['', '   '], ['c', '# 1 VF from NIC 1']],
    [['', '          '], ['k', 'openshift.io/sriov_bnk_int'], ['', ': '], ['s', '"1"'], ['', '   '], ['c', '# 1 VF from NIC 2']],
    [['', '          '], ['k', 'hugepages-1Gi'], ['', ': '], ['s', '4Gi']],
    [['', '          '], ['k', 'memory'], ['', ': '], ['s', '8Gi']],
    [['', '          '], ['k', 'cpu'], ['', ': '], ['s', '"4"']],
    [['', '        '], ['k', 'limits'], ['', ':']],
    [['', '          '], ['k', 'openshift.io/sriov_bnk_ext'], ['', ': '], ['s', '"1"']],
    [['', '          '], ['k', 'openshift.io/sriov_bnk_int'], ['', ': '], ['s', '"1"']],
    [['', '          '], ['k', 'hugepages-1Gi'], ['', ': '], ['s', '4Gi']],
    [['', '          '], ['k', 'memory'], ['', ': '], ['s', '8Gi']],
    [['', '          '], ['k', 'cpu'], ['', ': '], ['s', '"4"']],
    [['', '      '], ['k', 'volumeMounts'], ['', ':']],
    [['', '        - '], ['k', 'name'], ['', ': '], ['s', 'hugepages']],
    [['', '          '], ['k', 'mountPath'], ['', ': '], ['s', '/dev/hugepages']],
    [['', '  '], ['k', 'volumes'], ['', ':']],
    [['', '    - '], ['k', 'name'], ['', ': '], ['s', 'hugepages']],

    <span key={i}>{line.map((t, j) => <span key={j} className={t[0]}>{t[1]}</span>)}{'\n'}</span>

);

function YamlSection() {
  const [active, setActive] = useState("nodepolicy");
  const tab = YAML_TABS.find(t => t.id === active);

  let body = null;
  let filename = "";
  let lede = "";
  if (active === "nodepolicy") {
    body = NODE_POLICY;
    filename = "01-sriov-network-node-policies.yaml";
    lede = "Two policies — one per physical NIC. Each tells the Config Daemon how many VFs to create on its PF and which extended-resource pool to expose them as. The operator drains target nodes before reconfiguring VFs.";
  } else if (active === "sriovnet") {
    body = SRIOV_NETWORK;
    filename = "02-sriov-networks.yaml";
    lede = "Two SriovNetwork CRs — each pinned to a different NIC's resource pool. The operator auto-generates a NetworkAttachmentDefinition in networkNamespace for each.";
  } else if (active === "nad") {
    body = NAD;
    filename = "02-network-attachment-definitions.yaml";
    lede = "On vanilla Kubernetes (Multus + sriov-cni + sriov-device-plugin), you write these by hand. The k8s.v1.cni.cncf.io/resourceName annotation must match the prefix advertised by your device plugin — and there's one NAD per NIC pool.";
  } else if (active === "pod") {
    body = POD_SPEC;
    filename = "03-bigip-next-tmm-pod.yaml";
    lede = "BIG-IP Next TMM pod requesting one VF from each NIC pool — sriov_bnk_ext (NIC 1) and sriov_bnk_int (NIC 2) — plus hugepages and pinned cores.";
  }

  return (
    <section className="yaml-section">
      <h2 className="section-title">Configuration · YAML</h2>
      <h3 className="section-headline">Example manifests for the diagram above</h3>
      <p className="section-lede">
        These are the resources behind every step in the walk-through. The OpenShift path uses two
        SriovNetworkNodePolicy CRs (one per NIC) and two SriovNetwork CRs (one per pool); the operator generates the
        NetworkAttachmentDefinitions you'd otherwise hand-write on vanilla Kubernetes + Multus + sriov-cni.
      </p>

      <div className="yaml-tabs">
        {YAML_TABS.map(t => (
          <button key={t.id}
                  className={"yaml-tab" + (active === t.id ? " active" : "")}
                  onClick={() => setActive(t.id)}>
            {t.label}
          </button>
        ))}
      </div>

      <div className="yaml-pane">
        <div className="label-row">
          {tab.platform === "openshift"
            ? <span className="badge openshift">OpenShift</span>
            : <span className="badge vanilla">Vanilla K8s + Multus</span>}
          <span className="filename">{filename}</span>
          {active === "nad" && <span className="badge note">Auto-generated on OpenShift</span>}
          {active === "pod" && <span className="badge note">Same on OpenShift &amp; vanilla (resource prefix may differ)</span>}
        </div>
        {body}
      </div>
    </section>
  );
}

function App() {
  const [phase, setPhase] = useState(0);
  const [playing, setPlaying] = useState(false);

  const handleReset = useCallback(() => { setPlaying(false); setPhase(0); }, []);
  const handlePlay = useCallback(() => {
    if (phase >= PHASES.length - 1) {
      setPhase(0);
      setTimeout(() => setPlaying(true), 50);
    } else {
      setPlaying(true);
    }
  }, [phase]);
  const handlePause = useCallback(() => setPlaying(false), []);
  const handleStep = useCallback(() => {
    setPlaying(false);
    setPhase(p => Math.min(p + 1, PHASES.length - 1));
  }, []);
  const handleBack = useCallback(() => {
    setPlaying(false);
    setPhase(p => Math.max(p - 1, 0));
  }, []);

  useEffect(() => {
    if (phase >= PHASES.length - 1 && playing) setPlaying(false);
  }, [phase, playing]);

  return (
    <div className="app">
      <header>
        <div>
          <a href="index.html" style={{display:'inline-flex',alignItems:'center',gap:'6px',fontFamily:'monospace',fontSize:'0.68rem',letterSpacing:'0.16em',textTransform:'uppercase',color:'#8a92a6',textDecoration:'none',padding:'4px 12px',border:'1px solid #2c3142',borderRadius:'20px',background:'rgba(255,255,255,0.02)',marginBottom:'8px',transition:'color .2s,border-color .2s'}}
            onMouseEnter={e=>{e.currentTarget.style.color='#6ea8fe';e.currentTarget.style.borderColor='#6ea8fe55';}}
            onMouseLeave={e=>{e.currentTarget.style.color='#8a92a6';e.currentTarget.style.borderColor='#2c3142';}}>
            ← Training Portal
          </a>
          <h1><span className="f5">F5 BIG-IP Next</span> on OpenShift <span className="rh">SR-IOV</span> — pod attachment & traffic flow</h1>
          <div className="subtitle">Phase {phase + 1} of {PHASES.length} · {PHASES[phase].title}</div>
        </div>
        <div className="controls">
          <button className="btn" onClick={handleReset}>↺ Reset</button>
          <button className="btn" onClick={handleBack} disabled={phase === 0}>◀ Back</button>
          {playing
            ? <button className="btn" onClick={handlePause}>❚❚ Pause</button>
            : <button className="btn primary" onClick={handlePlay}>▶ Play</button>}
          <button className="btn" onClick={handleStep} disabled={phase >= PHASES.length - 1}>Step ▶</button>
        </div>
      </header>

      <div className="stage">
        <Diagram phase={phase} playing={playing} onPhaseChange={setPhase} />
      </div>

      <aside className="sidebar">
        <h2>Walk-through</h2>
        {PHASES.map((p, i) => (
          <div key={i}
               className={"phase" + (i === phase ? " active" : "")}
               onClick={() => { setPlaying(false); setPhase(i); }}>
            <div><span className="num">{i + 1}</span><span className="title">{p.title}</span></div>
            <div className="desc">{p.desc}</div>
          </div>
        ))}

        <div className="legend">
          <h2 style={{ marginTop: 0 }}>Legend</h2>
          <div className="row"><span className="dot sriov"></span> external VF — north/south traffic</div>
          <div className="row"><span className="dot sriov2"></span> internal VF — east/west traffic</div>
          <div className="row"><span className="dot kernel"></span> host kernel stack — bypassed</div>
          <div className="row"><span className="dot ctrl"></span> control-plane signaling</div>
        </div>
      </aside>

      <YamlSection />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
